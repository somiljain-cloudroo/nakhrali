project_id = "swfyybcczjkwjbddzfgd"

[auth]
site_url = "https://nakhrali.com.au"
additional_redirect_urls = ["https://nakhrali.com.au", "https://nakhrali.com.au/**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Confirm your Nakhrali account"
content_path = "./supabase/emails/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your Nakhrali password"
content_path = "./supabase/emails/recovery.html"

[auth.email.template.magic_link]
subject = "Your Nakhrali sign-in link"
content_path = "./supabase/emails/magic_link.html"

[functions.send-invite]
verify_jwt = false

[functions.bulk-create-products]
verify_jwt = false

[functions.get-all-contacts]
verify_jwt = false

[functions.meta-catalog-feed]
verify_jwt = false

[functions.calculate-shipping]
verify_jwt = false

[functions.send-pending-approval-email]
verify_jwt = false

[functions.send-account-approved-email]
verify_jwt = false

[functions.send-order-approval-email]
enabled = true
verify_jwt = true
import_map = "./functions/send-order-approval-email/deno.json"
entrypoint = "./functions/send-order-approval-email/index.ts"
